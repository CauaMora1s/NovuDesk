name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/novudesk-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/novudesk-web

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.version.outputs.VERSION }}
            ${{ env.IMAGE_WEB }}:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: docker-compose.prod.yml
          generate_release_notes: true
          body: |
            ## Deploy

            ```bash
            # Download the docker-compose file
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/docker-compose.prod.yml

            # Copy and configure environment
            cp .env.example .env
            # Edit .env with your settings

            # Start
            VERSION=${{ steps.version.outputs.VERSION }} docker compose -f docker-compose.prod.yml up -d
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.en.md) for full setup instructions.
